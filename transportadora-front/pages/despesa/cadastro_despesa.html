<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cadastrar Despesa</title>
  <link href="/css/cadastro_viagem.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body onload="carregarVeiculos('selectVeiculo');carregarEmpresas('selectEmpresa');carregarDonos('selectMotorista');carregarCondicoes('selectCondicao');">
  <header id="menu-container"></header>
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7 col-sm-12">
        <div class="card shadow-lg">
          <div class="card-body">
            <h2 class="h4 mb-4 text-center">Cadastro de Despesa</h2>

            <form onsubmit="cadastroDespesa(event)">
            
                <div class="mb-3">
                    <label for="dataDespesa" class="form-label">Data</label>
                    <input type="date" id="dataDespesa" class="form-control">
                </div>

                <div class="input-group mb-3">
                    <label class="input-group-text" for="selectVeiculo">Veículo</label>
                    <select class="form-select" id="selectVeiculo">
                        <option value="">Selecione...</option>
                    </select>
                </div>
                
                 <div class="input-group mb-3">
                    <label class="input-group-text" for="selectMotorista">Motorista</label>
                    <select class="form-select" id="selectMotorista">
                        <option value="">Selecione...</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="descricao" class="form-label">Descrição</label>
                    <input type="text" id="descricao" class="form-control" placeholder="..." required>
                </div>

                <div class="input-group mb-3">
                    <label class="input-group-text" for="selectEmpresa">Empresa</label>
                    <select class="form-select" id="selectEmpresa">
                        <option value="">Selecione...</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="nf" class="form-label">N° NOTA FISCAL</label>
                    <input type="text" id="nf" class="form-control" placeholder="N° Nota Fiscal" required>
                </div>

                <div class="mb-3">
                    <label for="valorDespesa" class="form-label">Valor Despesa</label>
                    <div class="input-group mb-3">
                         <span class="input-group-text">R$</span>
                         <input type="number" id="valorDespesa" class="form-control" placeholder="Ex: 4,5" min="0" step="0.1" required>
                    </div>
                </div>

                <div class="input-group mb-3">
                        <label class="input-group-text" for="selectCondicao">Condição</label>
                        <select class="form-select" id="selectCondicao">
                            <option value>Selecione...</option>
                        </select>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Cadastrar</button>
                </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../../js/despesa.js"></script>
  <script src="../../js/veiculo.js"></script>
  <script src="../../js/usuario.js"></script>
  <script src="../../js/empresa.js"></script>
  <script src="../../js/menu.js"></script>
  <script src="../../js/condicao.js"></script>
</body>
</html>
