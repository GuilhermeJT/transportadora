<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RELATORIO ABASTECIMENTOS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body class="bg-light">
  <header id="menu-container"></header>
  
  <div class="container mt-4">
    <h2 class="h4 mb-3">Relatório Abastecimento</h2>

    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title mb-3">Filtrar Abastecimentos</h5>
        <form>
          <div class="row g-3 align-items-end">
            <div class="col-md-4">
              <label class="form-label">Data Início</label>
              <input type="date" id="dataInicio" class="form-control" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Data Fim</label>
              <input type="date" id="dataFim" class="form-control" required>
            </div>
            <div class="col-md-4 d-flex gap-2 align-items-end">
              <button type="submit" class="btn btn-success" id="btnFiltrar">Filtrar</button>
              <button type="button" class="btn btn-secondary" id="btnLimpar">Limpar</button>
              <button type="button" class="btn btn-danger" id="btnPdf" title="Baixar PDF do período">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" style="vertical-align:-2px;">
                  <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
                  <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
                </svg>
                PDF
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-bordered table-hover align-middle">
        <thead class="table-secondary">
          <tr>
            <th>DATA</th>
            <th>EMPRESA</th>
            <th>NF</th>
            <th>PLACA</th>
            <th>KM ODOMETRO</th>
            <th>LITROS</th>
            <th>VALOR</th>
            <th>DESCONTO</th>
            <th>TOTAL</th>
            <th>MEDIA</th>
            <th class="text-center">Condição</th>
            <th class="text-center">Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaAbastecimento">
          <!-- Linhas via JS -->
        </tbody>
      </table>
    </div>

    <div class="mt-3 d-flex justify-content-between align-items-center">
      <a href="cadastro_abastecimento.html" class="btn btn-primary">Cadastrar novo Abastecimento</a>
      <div id="totalAbastecimento" class="h5 mb-0 fw-bold text-danger" style="display: none;">
        Total: R$ 0,00
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="../../js/abastecimento.js"></script>
  <script src="../../js/menu.js"></script>
  

</body>
</html>
