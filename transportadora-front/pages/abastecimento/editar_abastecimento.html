<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editar Abastecimento</title>
  <link href="/css/cadastro_viagem.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body onload="carregarVeiculos('selectVeiculo'); carregarEmpresas('selectEmpresa'); carregarCondicoes('selectCondicao')">
  <header id="menu-container"></header>
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7 col-sm-12">
        <div class="card shadow-lg">
          <div class="card-body">
            <h2 class="h4 mb-4 text-center">Editar Abastecimento</h2>

            <form onsubmit="updateAbastecimento(event)"> <!--mudar para CadastroAbastecimento-->
                <div class="mb-3">
                    <label for="dataDespesa" class="form-label">Data</label>
                    <input type="date" id="dataAbastecimento" class="form-control">
                </div>

                <div class="input-group mb-3">
                    <label class="input-group-text" for="selectEmpresa">Empresa</label>
                    <select class="form-select" id="selectEmpresa">
                        <option value="">Selecione...</option>
                    </select>
                </div>

                <div class="mb-3">
                        <label for="Nf" class="form-label">NF</label>
                        <div class="input-group mb-3">
                            <input type="number" id="Nf" class="form-control" placeholder="Ex: 40111" min="0" step="1" >
                        </div>
                </div>

                <div class="input-group mb-3">
                    <label class="input-group-text" for="selectVeiculo">Veículo</label>
                    <select class="form-select" id="selectVeiculo">
                        <option value="">Selecione...</option>
                    </select>
                </div>


                <div class="mb-3">
                        <label for="kmOdometro" class="form-label">Km Odometro</label>
                        <div class="input-group mb-3">
                            <span class="input-group-text">R$</span>
                            <input type="number" id="kmOdometro" class="form-control" placeholder="Ex: 840" min="0" step="0.01" >
                        </div>
                </div>

                 <div class="mb-3">
                        <label for="litros" class="form-label">Litros</label>
                        <div class="input-group mb-3">
                            <span class="input-group-text">R$</span>
                            <input type="number" id="litros" class="form-control" placeholder="Ex: 100" min="0" step="0.01" >
                        </div>
                </div>

                <div class="mb-3">
                        <label for="valorUni" class="form-label">Valor Unitário</label>
                        <div class="input-group mb-3">
                            <span class="input-group-text">R$</span>
                            <input type="number" id="valorUni" class="form-control" placeholder="Ex: 10" min="0" step="0.01" >
                        </div>
                </div>

                <div class="mb-3">
                        <label for="desconto" class="form-label">Desconto</label>
                        <div class="input-group mb-3">
                            <span class="input-group-text">R$</span>
                            <input type="number" id="desconto" class="form-control" placeholder="Ex: 60" min="0" step="0.01" >
                        </div>
                </div>
                
                <div class="input-group mb-3">
                    <label class="input-group-text" for="selectCondicao">Condição</label>
                    <select class="form-select" id="selectCondicao">
                        <option value="">Selecione...</option>
                    </select>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../../js/veiculo.js"></script>
  <script src="../../js/empresa.js"></script>
  <script src="../../js/condicao.js"></script>
  <script src="../../js/menu.js"></script>
  <script src="../../js/abastecimento.js"></script>
</body>
</html>
